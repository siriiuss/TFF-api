name: Python Tests

# Trigger tests on push to the master branch or any pull request
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        # Using 3.13 to ensure the latest stable environment
        python-version: "3.13"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Ensure test-specific packages are installed
        pip install pytest pytest-asyncio respx httpx fastapi starlette beautifulsoup4 lxml fastapi-cache2

    - name: Run Pytest
      run: |
        # Run all tests in the tests/ directory
        pytest tests/ -v
